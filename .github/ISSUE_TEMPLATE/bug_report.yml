name: Bug report
description: Something broke when you ran huddle
labels: [bug]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-line description of what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Claude Code version: (run `claude --version`)
        bun version: (run `bun --version`)
        OS:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      description: Excerpts from `~/.claude/channels/huddle/coordinator.log` and/or `transcript.jsonl`
      render: text
