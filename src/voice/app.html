<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>huddle voice</title>
<style>
  :root {
    --bg: #16130e;
    --panel: #1d1913;
    --line: #2c261c;
    --ink: #e8e0d0;
    --dim: #8a8070;
    --amber: #e8a33d;
    --amber-dim: #7a5a28;
    --blue: #7f9bb3;
    --red: #c9614f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
    display: flex;
    flex-direction: column;
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px;
    gap: 14px;
  }

  header { display: flex; align-items: center; gap: 12px; }
  h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; }
  h1 span { color: var(--amber); }
  #state {
    color: var(--dim);
    font-size: 12px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  button {
    font: inherit;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--ink);
    background: none;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
  }
  button:hover { border-color: var(--amber-dim); }
  button:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
  button.primary { border-color: var(--amber); color: var(--amber); }
  button[hidden] { display: none; }

  #meter {
    width: 100%;
    height: 56px;
    display: block;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
  }

  #transcript {
    flex: 1;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel);
    padding: 10px 12px;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #transcript li { display: flex; gap: 10px; align-items: baseline; }
  #transcript .who {
    flex: none;
    width: 64px;
    text-align: right;
    font-size: 12px;
    color: var(--blue);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #transcript li.from-user .who { color: var(--dim); }
  #transcript li.from-orch .who { color: var(--amber); }
  #transcript .txt { word-break: break-word; }
  #transcript li.empty { color: var(--dim); justify-content: center; padding: 24px 0; }

  footer { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); }
  footer a { color: var(--dim); }
  footer a:hover { color: var(--amber); }
  #conn.bad { color: var(--red); }
</style>
</head>
<body>
  <header>
    <h1><span>●</span> huddle voice</h1>
    <div id="state" role="status">off — arm to listen for @voice reports</div>
    <button id="arm" class="primary">Arm</button>
    <button id="wake" hidden>Wake</button>
    <button id="sleep" hidden>Sleep</button>
  </header>

  <canvas id="meter" width="640" height="56" aria-hidden="true"></canvas>

  <ol id="transcript" aria-label="channel transcript"></ol>

  <footer>
    <a href="#" id="testwake">test wake</a>
    <span id="conn">connecting…</span>
  </footer>

<script>
'use strict'
// Sleep only after a comfortable stretch of USER SILENCE: IDLE_MS normally,
// ACTIVATION_GRACE_MS for the first window (before the user has spoken, so we
// don't cut them off just as they're about to talk). Adjust here only.
const IDLE_MS = 20000, ACTIVATION_GRACE_MS = 45000, GOODBYE_DRAIN_MS = 4000, DEBOUNCE_MS = 2000, VOICE = 'voice', ORCH = 'orch'
const SEND_TOOL = {
  type: 'function', name: 'send_to_orchestrator',
  description: 'Relay a request or answer from the user to the orchestrator Claude session. Use for anything requiring real work: spawning/stopping coding sessions, status checks, log summaries. The reply arrives asynchronously — acknowledge out loud that you passed it on, and never invent results.',
  parameters: { type: 'object', properties: { text: { type: 'string', description: 'The message to send.' } }, required: ['text'] },
}
// Spoken "go to sleep" is a model tool call, not transcript matching: the model
// only fires it when the user clearly addresses it, so accidental triggers stay
// unlikely without any fuzzy phrase parsing here.
const SLEEP_TOOL = {
  type: 'function', name: 'go_to_sleep',
  description: 'Put yourself to sleep (stop listening) when the user clearly and directly tells you to — e.g. "go to sleep", "that\'s all", "we\'re done", "stand down". Only when the user is plainly addressing you and ending the session; never for a passing or hypothetical mention of sleep. Say a brief one-line goodbye first.',
  parameters: { type: 'object', properties: {}, required: [] },
}

const $ = id => document.getElementById(id)
const els = { state: $('state'), arm: $('arm'), wake: $('wake'), sleep: $('sleep'), transcript: $('transcript'), conn: $('conn'), meter: $('meter'), testwake: $('testwake') }

// ---- page state ----------------------------------------------------------
let mode = 'off'            // off | asleep | waking | awake
let records = []            // channel messages for recap + display
let pending = []            // reports waiting on debounce / spawn
let debounceTimer = null, idleTimer = null, engaged = false
let waiting = false        // outstanding @orch request → hold the idle countdown
let sleepRequested = false // user asked to sleep → sleep after the goodbye turn
let ws = null, pc = null, dc = null, micStream = null, remoteAudioEl = null
let audioCtx = null, analyser = null

function setState(text) { els.state.textContent = text }
function show(btn, on) { btn.hidden = !on }
function ui() {
  show(els.arm, mode === 'off')
  show(els.wake, mode === 'asleep')
  show(els.sleep, mode === 'waking' || mode === 'awake')
}

// ---- transcript ----------------------------------------------------------
function addRecord(rec) {
  if (rec.kind !== 'msg') return
  records.push(rec)
  if (records.length > 200) records.shift()
  render()
}
function render() {
  els.transcript.innerHTML = ''
  if (!records.length) {
    const li = document.createElement('li')
    li.className = 'empty'
    li.textContent = 'no channel messages yet'
    els.transcript.appendChild(li)
    return
  }
  for (const r of records) {
    const li = document.createElement('li')
    li.className = 'from-' + (r.sender === 'user' ? 'user' : r.sender === ORCH ? 'orch' : 'peer')
    const who = document.createElement('span'); who.className = 'who'; who.textContent = r.sender
    const txt = document.createElement('span'); txt.className = 'txt'; txt.textContent = r.text
    li.append(who, txt)
    els.transcript.appendChild(li)
  }
  els.transcript.scrollTop = els.transcript.scrollHeight
}

// ---- huddle bridge -------------------------------------------------------
function connectWs() {
  ws = new WebSocket(`ws://${location.host}/ws`)
  ws.onopen = () => { els.conn.textContent = 'bridge connected'; els.conn.className = '' }
  ws.onclose = () => {
    els.conn.textContent = 'bridge offline — retrying'; els.conn.className = 'bad'
    setTimeout(connectWs, 2000)
  }
  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data)
    if (msg.t === 'history') { records = msg.records.filter(r => r.kind === 'msg'); render() }
    if (msg.t === 'record') {
      addRecord(msg.record)
      const r = msg.record
      if (r.kind === 'msg' && r.mentions.includes(VOICE) && r.sender !== 'user') {
        onReport(`${r.sender}: ${r.text}`)
      }
    }
    if (msg.t === 'bridge_error') { els.conn.textContent = 'bridge error: ' + msg.reason; els.conn.className = 'bad' }
  }
}
function sendToChannel(text, mentions) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t: 'send', text, mentions }))
}

// ---- wake logic ----------------------------------------------------------
function onReport(text) {
  if (mode === 'off') return
  if (mode === 'awake' && dc && dc.readyState === 'open') { waiting = false; inject(text); return }
  pending.push(text)
  if (mode === 'asleep') {
    mode = 'waking'; ui(); setState('waking…')
    debounceTimer = setTimeout(() => wake(pending.splice(0)), DEBOUNCE_MS)
  }
}

async function arm() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true })
    s.getTracks().forEach(t => t.stop()) // permission only; mic stays off while asleep
  } catch {
    setState('mic blocked — allow microphone for localhost, then arm again')
    return
  }
  audioCtx = audioCtx || new AudioContext()
  await audioCtx.resume()
  mode = 'asleep'; ui(); setState('asleep — waiting for @voice reports')
}

async function wake(reports) {
  mode = 'waking'; ui(); setState('waking…')
  engaged = false; waiting = false; sleepRequested = false
  try {
    const secretRes = await fetch('/secret', { method: 'POST' })
    const secret = await secretRes.json()
    const key = secret.value || (secret.client_secret && secret.client_secret.value)
    if (!key) throw new Error('no client secret: ' + JSON.stringify(secret).slice(0, 200))

    micStream = await navigator.mediaDevices.getUserMedia({ audio: true })
    pc = new RTCPeerConnection()
    pc.addTrack(micStream.getTracks()[0])
    remoteAudioEl = new Audio()
    remoteAudioEl.autoplay = true
    pc.ontrack = e => { remoteAudioEl.srcObject = e.streams[0]; hookMeter(e.streams[0]) }
    dc = pc.createDataChannel('oai-events')
    dc.onmessage = e => onModelEvent(JSON.parse(e.data))
    dc.onopen = () => {
      dcSend({ type: 'session.update', session: {
        type: 'realtime',
        instructions: buildInstructions(reports),
        output_modalities: ['audio'],
        tools: [SEND_TOOL, SLEEP_TOOL],
        tool_choice: 'auto',
        audio: { input: { turn_detection: { type: 'server_vad' } }, output: { voice: 'marin' } },
      } })
      inject(reports.length
        ? 'Deliver the new report(s) to the user now, in one or two sentences.'
        : 'Greet the user in a few words and ask what they need.')
      mode = 'awake'; ui(); setState('awake — listening')
    }
    const offer = await pc.createOffer()
    await pc.setLocalDescription(offer)
    const sdpRes = await fetch('https://api.openai.com/v1/realtime/calls?model=gpt-realtime-2.1', {
      method: 'POST',
      headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/sdp' },
      body: offer.sdp,
    })
    if (!sdpRes.ok) throw new Error('SDP exchange failed: ' + sdpRes.status + ' ' + (await sdpRes.text()).slice(0, 200))
    await pc.setRemoteDescription({ type: 'answer', sdp: await sdpRes.text() })
  } catch (err) {
    console.error(err)
    setState('wake failed: ' + err.message)
    teardown()
  }
}

function buildInstructions(reports) {
  const recap = records.slice(-20).map(r => `${r.sender}: ${r.text}`)
  return [
    "You are the user's terse voice liaison to their Claude Code orchestrator.",
    'Speak briefly. Use the send_to_orchestrator tool for anything needing real work. Never fabricate results.',
    'When the user clearly tells you to go to sleep or that they are done, call go_to_sleep after a brief goodbye.',
    'Recent channel history:', ...recap,
    ...(reports.length ? ['New report(s) to relay to the user now:', ...reports] : []),
  ].join('\n')
}

function dcSend(obj) { if (dc && dc.readyState === 'open') dc.send(JSON.stringify(obj)) }
function inject(text) {
  dcSend({ type: 'conversation.item.create', item: { type: 'message', role: 'user', content: [{ type: 'input_text', text }] } })
  dcSend({ type: 'response.create' })
  clearIdle()
}

function onModelEvent(ev) {
  if (ev.type === 'input_audio_buffer.speech_started') {
    engaged = true
    sleepRequested = false // barge-in after "go to sleep" = changed mind, stay awake
    clearIdle()
    setState('awake — you are speaking')
  }
  if (ev.type === 'response.output_audio_transcript.delta') setState('awake — speaking')
  if (ev.type === 'response.done') {
    const calls = ((ev.response && ev.response.output) || []).filter(o => o.type === 'function_call')
    for (const c of calls) {
      if (c.name === 'go_to_sleep') {
        // Manual sleep: acknowledge, then sleep on the next completed turn — we
        // don't cut a reply off mid-sentence, but skip the silence window. Any
        // outstanding @orch reply simply re-wakes us later, so nothing is lost.
        sleepRequested = true
        dcSend({ type: 'conversation.item.create', item: { type: 'function_call_output', call_id: c.call_id, output: 'Acknowledged — give a brief one-line goodbye, then stop.' } })
        dcSend({ type: 'response.create' })
        continue
      }
      let text = ''
      try { text = JSON.parse(c.arguments).text } catch {}
      if (c.name === 'send_to_orchestrator' && text) { sendToChannel(text, [ORCH]); waiting = true }
      dcSend({ type: 'conversation.item.create', item: { type: 'function_call_output', call_id: c.call_id, output: 'sent — the reply will arrive asynchronously.' } })
      dcSend({ type: 'response.create' })
    }
    if (!calls.length) {
      // Let the goodbye finish, then sleep — prompt vs the full silence window,
      // but the user still hears the acknowledgment. Barge-in cancels it.
      if (sleepRequested) { setState('going to sleep'); clearIdle(); idleTimer = setTimeout(() => { idleTimer = null; sleep() }, GOODBYE_DRAIN_MS) }
      else armIdle()
    }
    if (mode === 'awake') setState('awake — listening')
  }
  if (ev.type === 'error') console.error('realtime error', ev)
}

function armIdle() {
  clearIdle()
  const window = engaged ? IDLE_MS : ACTIVATION_GRACE_MS // longer grace before the user's first word
  idleTimer = setTimeout(() => {
    idleTimer = null
    if (waiting) return // held while a request is outstanding; a later turn re-arms
    setState('idle — going back to sleep'); sleep()
  }, window)
}
function clearIdle() { if (idleTimer) { clearTimeout(idleTimer); idleTimer = null } }

function teardown() {
  clearIdle()
  if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null }
  if (dc) { try { dc.close() } catch {} dc = null }
  if (pc) { try { pc.close() } catch {} pc = null }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null }
  if (remoteAudioEl) { remoteAudioEl.srcObject = null; remoteAudioEl = null }
  analyser = null
  if (mode !== 'off') { mode = 'asleep'; setState('asleep — waiting for @voice reports') }
  ui()
}
function sleep() { teardown() }

// ---- live audio meter (the real signal, not decoration) -------------------
function hookMeter(stream) {
  if (!audioCtx) return
  analyser = audioCtx.createAnalyser()
  analyser.fftSize = 64
  audioCtx.createMediaStreamSource(stream).connect(analyser)
  if (micStream) audioCtx.createMediaStreamSource(micStream).connect(analyser)
}
const mctx = els.meter.getContext('2d')
function drawMeter() {
  requestAnimationFrame(drawMeter)
  const w = els.meter.width, h = els.meter.height
  mctx.clearRect(0, 0, w, h)
  const style = getComputedStyle(document.documentElement)
  const amber = style.getPropertyValue('--amber').trim() || '#e8a33d'
  const dim = style.getPropertyValue('--line').trim() || '#2c261c'
  const bars = 32, gap = 4, bw = (w - gap * (bars + 1)) / bars
  let data = null
  if (analyser && (mode === 'awake' || mode === 'waking')) {
    data = new Uint8Array(analyser.frequencyBinCount)
    analyser.getByteFrequencyData(data)
  }
  for (let i = 0; i < bars; i++) {
    const level = data ? data[Math.floor(i * data.length / bars)] / 255 : 0
    const bh = Math.max(2, level * (h - 12))
    mctx.fillStyle = level > 0.02 ? amber : dim
    mctx.fillRect(gap + i * (bw + gap), (h - bh) / 2, bw, bh)
  }
}
drawMeter()

// ---- controls --------------------------------------------------------------
els.arm.onclick = arm
els.wake.onclick = () => wake([])
els.sleep.onclick = sleep
els.testwake.onclick = e => {
  e.preventDefault()
  onReport('test: this is a local test report — say hello so the user can hear you.')
}

ui()
connectWs()
</script>
</body>
</html>
